apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uaa-secret
  namespace: {{ .Values.namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  refreshInterval: 1m
  data:
  - secretKey: uaa.yml
    remoteRef:
      key: uaa-secret
      version: latest